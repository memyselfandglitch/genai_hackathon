services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-flash-latest}
      # Persist DB under the mounted volume (override for Postgres in production)
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:////app/data/exec_assistant.db}
      DEBUG: ${DEBUG:-false}
    env_file:
      - path: .env
        required: false
    volumes:
      - assistant-data:/app/data

volumes:
  assistant-data:
